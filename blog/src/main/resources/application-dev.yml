spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD:20040425}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.blog.blog: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
jwt:
  secret: ${JWT_SECRET:myVeryLongSecretKeyForHS512AlgorithmThatIsAtLeastSixtyFourCharactersLongAndSecureEnoughForDevelopment}
  expiration: 86400000
